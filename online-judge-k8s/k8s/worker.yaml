apiVersion: apps/v1
kind: Deployment
metadata:
  name: judge-worker
  labels:
    app: judge-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: judge-worker
  template:
    metadata:
      labels:
        app: judge-worker
    spec:
      serviceAccountName: online-judge-backend
      containers:
      - name: worker
        image: online-judge/backend:v2.0
        imagePullPolicy: IfNotPresent
        command: ["python", "worker.py"] 
        ports:
        - containerPort: 8001
        env:
        - name: REDIS_HOST
          value: "online-judge-redis"
        - name: JUDGE_IMAGE
          value: "online-judge/judge:v2.0"
        - name: JOB_TTL_SECONDS    
          value: "20"             